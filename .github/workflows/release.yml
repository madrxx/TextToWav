name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore and build Release
        shell: pwsh
        run: msbuild TextToWav.csproj /restore /p:Configuration=Release /p:Platform="AnyCPU"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/TextToWav.exe
